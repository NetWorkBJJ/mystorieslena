<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#3a1f22" />
      <stop offset="55%" stop-color="#1a0f12" />
      <stop offset="100%" stop-color="#0a0608" />
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3d378" />
      <stop offset="40%" stop-color="#d6a93c" />
      <stop offset="100%" stop-color="#8a6a1e" />
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1cf6f" />
      <stop offset="100%" stop-color="#c08e2b" />
    </linearGradient>
    <radialGradient id="heartGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8a1a23" />
      <stop offset="60%" stop-color="#3d0a10" />
      <stop offset="100%" stop-color="#1b0507" />
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.55" />
    </filter>
  </defs>

  <!-- Fundo arredondado dark vinho-preto -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#bg)" />

  <!-- Moldura art déco externa -->
  <rect x="28" y="28" width="456" height="456" rx="74" ry="74"
        fill="none" stroke="url(#goldSoft)" stroke-width="2.2" opacity="0.55" />
  <rect x="40" y="40" width="432" height="432" rx="64" ry="64"
        fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.35" />

  <!-- Cantos ornamentados art déco -->
  <g fill="url(#gold)" opacity="0.85">
    <!-- top-left -->
    <path d="M64 96 L64 64 L96 64 L96 70 L70 70 L70 96 Z" />
    <circle cx="78" cy="78" r="3.2" />
    <!-- top-right -->
    <path d="M448 96 L448 64 L416 64 L416 70 L442 70 L442 96 Z" />
    <circle cx="434" cy="78" r="3.2" />
    <!-- bottom-left -->
    <path d="M64 416 L64 448 L96 448 L96 442 L70 442 L70 416 Z" />
    <circle cx="78" cy="434" r="3.2" />
    <!-- bottom-right -->
    <path d="M448 416 L448 448 L416 448 L416 442 L442 442 L442 416 Z" />
    <circle cx="434" cy="434" r="3.2" />
  </g>

  <!-- Coração central com brilho de tinta vermelha -->
  <g filter="url(#shadow)">
    <path
      d="M256 408
         C 156 348, 92 282, 92 212
         C 92 162, 132 124, 184 124
         C 218 124, 244 142, 256 168
         C 268 142, 294 124, 328 124
         C 380 124, 420 162, 420 212
         C 420 282, 356 348, 256 408 Z"
      fill="url(#heartGlow)"
      stroke="url(#gold)"
      stroke-width="4"
      stroke-linejoin="round"
    />
  </g>

  <!-- Monograma "L" estilizado dentro do coração -->
  <g fill="url(#gold)" filter="url(#shadow)">
    <!-- Serifa elegante de "L" -->
    <path d="M218 198 L218 312 L298 312 L298 296 L240 296 L240 198 Z" />
    <!-- Ornamento decorativo na haste -->
    <rect x="216" y="196" width="26" height="4" />
    <rect x="216" y="310" width="84" height="4" />
    <circle cx="223" cy="180" r="3.5" />
    <circle cx="298" cy="320" r="3.5" />
  </g>

  <!-- Pequena rosa estilizada (suave, no canto inferior do coração) -->
  <g opacity="0.55" fill="url(#goldSoft)">
    <circle cx="256" cy="346" r="6" />
    <path d="M250 346 Q256 338 262 346 Q256 354 250 346 Z" />
    <path d="M252 340 Q256 336 260 340 Q256 344 252 340 Z" fill="#3a1f22" />
  </g>

  <!-- Coroa sutil acima do coração (toque "milionário") -->
  <g fill="url(#gold)" opacity="0.92">
    <path d="M218 116 L228 96 L238 110 L256 86 L274 110 L284 96 L294 116 Z" />
    <rect x="218" y="116" width="76" height="5" />
    <circle cx="256" cy="92" r="3.2" fill="#f3d378" />
    <circle cx="228" cy="100" r="2.4" fill="#f3d378" />
    <circle cx="284" cy="100" r="2.4" fill="#f3d378" />
  </g>
</svg>
