name: Release

# Dispara quando uma tag v*.*.* é pushed.
# Exemplo: git tag v1.0.43 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # permite disparo manual pela aba Actions do GitHub

# Necessário pro electron-updater conseguir criar/editar releases via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # CRITICO: max-parallel=1 evita race condition na criacao da release no
      # GitHub. Os jobs antes rodavam em paralelo e ambos tentavam fazer
      # POST /releases com a mesma tag -> 422 already_exists. Agora rodam
      # serializados: o primeiro garante que a release existe, o segundo
      # apenas anexa assets.
      max-parallel: 1
      matrix:
        include:
          # 1) Windows roda PRIMEIRO: cria a release no GitHub se nao existir
          # ainda (`gh release create` idempotente) e anexa os assets do .exe
          # + latest.yml.
          - os: windows-latest
            label: windows
          # 2) macOS roda DEPOIS num Apple Silicon runner (macos-latest) e
          # cross-compila AMBAS archs (arm64 + x64) num só job. Evita o
          # problema do macos-13 (Intel) que está com fila gigante e em
          # processo de descontinuacao pela GitHub.
          # O electron-builder le `mac.target.arch` do package.json
          # (["arm64","x64"]) e gera os dois .dmg/.zip + um latest-mac.yml
          # consolidado com ambas as entradas em `files[]`.
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci
        env:
          npm_config_optional: "true"

      - name: Gerar ícones (todos os formatos)
        # build-icon.js gera .ico, .icns e .png numa só chamada — funciona
        # em qualquer plataforma porque png2icons e sharp são puros JS.
        run: npm run icon:build

      - name: Build Next.js standalone
        run: npm run build

      # Garante que a release existe antes de qualquer upload manual. Idempotente:
      # se a release ja foi criada (por outro job ou por uma re-execucao), o
      # `gh release view` passa e o `gh release create` e pulado.
      - name: Garantir release no GitHub
        shell: bash
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────────────────────────────
      # Windows
      # ────────────────────────────────────────────────────────────────────
      - name: Empacotar (Windows)
        if: matrix.label == 'windows'
        run: npx electron-builder --win nsis --publish never

      - name: Anexar assets do Windows na release
        if: matrix.label == 'windows'
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist-electron/MyStoriesLena-Setup-*.exe \
            dist-electron/MyStoriesLena-Setup-*.exe.blockmap \
            dist-electron/latest.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────────────────────────────
      # macOS (arm64 + x64 cross-compiled)
      # ────────────────────────────────────────────────────────────────────
      # No Apple Silicon runner, electron-builder baixa o electron x64 e o
      # arm64 e gera os dois .app, .dmg e .zip — tudo num só job. Os módulos
      # nativos npm que usamos (sharp) já têm prebuilds universais ou são
      # cross-arch; se algum quebrar, o fallback é rebuildar com `npm rebuild
      # --arch=x64` antes do empacotamento.
      - name: Empacotar (macOS arm64 + x64)
        if: matrix.label == 'macos'
        run: npx electron-builder --mac dmg zip --arm64 --x64 --publish never
        env:
          # Sem assinatura — o app vai mostrar Gatekeeper warning na primeira
          # execução. Adicione APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD,
          # APPLE_TEAM_ID e CSC_LINK/CSC_KEY_PASSWORD se for assinar e
          # notarizar. O ad-hoc sign do scripts/mac-adhoc-sign.js já cobre o
          # mínimo (evita erro de "danificado" quando o usuário roda
          # `xattr -cr`).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # latest-mac.yml é o arquivo CRITICO que electron-updater procura no Mac.
      # Ao buildar arm64+x64 no mesmo job, o electron-builder gera um único
      # latest-mac.yml com ambas as entradas em `files[]`, então o auto-updater
      # escolhe o asset certo conforme a arch do Mac do usuário.
      - name: Anexar assets do macOS na release
        if: matrix.label == 'macos'
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist-electron/MyStoriesLena-*-arm64.dmg \
            dist-electron/MyStoriesLena-*-arm64.dmg.blockmap \
            dist-electron/MyStoriesLena-*-arm64.zip \
            dist-electron/MyStoriesLena-*-arm64.zip.blockmap \
            dist-electron/MyStoriesLena-*-x64.dmg \
            dist-electron/MyStoriesLena-*-x64.dmg.blockmap \
            dist-electron/MyStoriesLena-*-x64.zip \
            dist-electron/MyStoriesLena-*-x64.zip.blockmap \
            dist-electron/latest-mac.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload do artefato (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}-build
          path: dist-electron/
          if-no-files-found: warn
          retention-days: 7
