name: Release

# Dispara quando uma tag v*.*.* é pushed.
# Exemplo: git tag v1.0.9 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # permite disparo manual pela aba Actions do GitHub

# Necessário pro electron-updater conseguir criar/editar releases via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # CRITICO: max-parallel=1 evita race condition na criacao da release no
      # GitHub. Os dois jobs antes rodavam em paralelo e ambos tentavam fazer
      # POST /releases com a mesma tag -> 422 already_exists. Agora rodam
      # serializados: o primeiro garante que a release existe, o segundo
      # apenas anexa assets.
      max-parallel: 1
      matrix:
        include:
          # Windows roda PRIMEIRO: cria a release no GitHub se nao existir
          # ainda (`gh release create` idempotente) e anexa os assets do .exe
          # + latest.yml.
          - os: windows-latest
            artifact: MyStoriesLena-Setup-*.exe
          # macOS roda DEPOIS: a release ja existe (criada pelo Windows),
          # entao basta anexar os assets do .dmg/.zip + latest-mac.yml.
          # Antes usavamos `--publish always` no electron-builder, mas com
          # multi-arch (arm64+x64) ele tem race conditions e as vezes nao
          # publica `latest-mac.yml`, deixando o auto-updater Mac quebrado.
          - os: macos-latest
            artifact: MyStoriesLena-*.dmg

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci
        env:
          npm_config_optional: "true"

      - name: Gerar ícone (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run icon:build

      - name: Gerar ícone (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          npm run icon:build
          # electron-builder no Mac aceita .png direto, mas se quisermos .icns
          # nativo, dá pra converter aqui via iconutil. Por enquanto o PNG basta.

      - name: Build Next.js standalone
        run: npm run build

      # Garante que a release existe antes de qualquer upload manual. Idempotente:
      # se a release ja foi criada (por outro job ou por uma re-execucao), o
      # `gh release view` passa e o `gh release create` e pulado.
      - name: Garantir release no GitHub
        shell: bash
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${GITHUB_REF_NAME}" \
              --notes "Release ${GITHUB_REF_NAME}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Empacotar (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win nsis --publish never

      - name: Anexar assets do Windows na release
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist-electron/MyStoriesLena-Setup-*.exe \
            dist-electron/MyStoriesLena-Setup-*.exe.blockmap \
            dist-electron/latest.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Empacotar (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac dmg zip --publish never
        env:
          # Sem assinatura — app vai mostrar Gatekeeper warning na primeira execução.
          # Adicione APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID e
          # CSC_LINK/CSC_KEY_PASSWORD se for assinar e notarizar.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # latest-mac.yml é o arquivo CRITICO que electron-updater procura no Mac.
      # Antes confiavamos no `--publish always` do electron-builder pra anexa-lo,
      # mas as vezes ele falha silenciosamente e o auto-updater Mac retorna
      # "no update available" mesmo com release nova.
      #
      # NOTA: o runner macos-latest e arm64. O electron-builder cross-compila
      # so o arm64 por default mesmo com `arch: ["arm64", "x64"]` no
      # package.json — assets x64 nao saem do build, entao nao tentamos subir.
      - name: Anexar assets do macOS na release
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            dist-electron/MyStoriesLena-*-arm64.dmg \
            dist-electron/MyStoriesLena-*-arm64.dmg.blockmap \
            dist-electron/MyStoriesLena-*-arm64-mac.zip \
            dist-electron/MyStoriesLena-*-arm64-mac.zip.blockmap \
            dist-electron/latest-mac.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload do artefato (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: dist-electron/${{ matrix.artifact }}
          if-no-files-found: warn
          retention-days: 7
